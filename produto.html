        whatsapp: "Blood Silk Noir"

];

const prodId = parseInt(params.get('id'));
const p = produtos.find(x => x.id === prodId);

    document.getElementById('detalheProduto').innerHTML = '<p style="padding:200px 40px;text-align:center;opacity:.5">Produto não encontrado.</p>';
} else {

    const msg = encodeURIComponent('Olá! Tenho interesse no perfume ' + p.whatsapp);
    const waLink = 'https://wa.me/?text=' + msg;

    document.getElementById('detalheProduto').innerHTML = `

                    <div class="nota-item">

                    </div>
                    <div class="nota-item">

            <div class="detalhe-compra">

                <a href="${waLink}" target="_blank" class="btn-comprar">Compre já no WhatsApp</a>
            </div>
        </div>
    `;
}
