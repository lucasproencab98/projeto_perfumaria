<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kramer Parfum</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="perfumes">

<header class="header">
    <div class="container">
        <div class="logo"><img src="imagens/logo/logo.png" alt="Kramer Parfum"></div>
        <nav class="menu">
            <a href="index.html"      data-page="inicio">Início</a>
            <a href="perfumes.html"   data-page="perfumes">Perfumes</a>
            <a href="cosmeticos.html" data-page="cosmeticos">Cosméticos</a>
            <a href="marca.html"      data-page="marca">Marca</a>
            <a href="contato.html"    data-page="contato">Contato</a>
        </nav>
        <a href="#" class="btn-whatsapp">WhatsApp</a>
    </div>
</header>

<div class="detalhe-wrap" id="detalheProduto"></div>

<script>
const produtos = [
    {
        id: 1,
        nome: "Ocean",
        categoria: "Masculino",
        descricao: "Uma fragrância inspirada na força e profundidade do oceano. Fresca, intensa e marcante, Ocean carrega a essência do mar em cada borrifo.",
        notas: { topo: "Bergamota, Limão siciliano, Ozônico", coracao: "Flor de Lotus, Jasmin, Algas marinhas", fundo: "Âmbar, Sândalo, Almíscar branco" },
        sugestao: "Ideal para o dia a dia, ambientes ao ar livre e ocasiões casuais. Perfeito para os meses mais quentes.",
        preco: "R$ 189,90",
        imagem: "imagens/produtos/perfumes/ocean.png",
        whatsapp: "Ocean"
    },
    {
        id: 2,
        nome: "Máfios",
        categoria: "Masculino",
        descricao: "Poder, elegância e presença em uma fragrância intensa. Máfios foi criado para homens que deixam marcas onde passam.",
        notas: { topo: "Pimenta negra, Cardamomo, Bergamota", coracao: "Couro, Oud, Violeta", fundo: "Vetiver, Âmbar escuro, Baunilha" },
        sugestao: "Recomendado para noites especiais, eventos formais e ocasiões que exigem presença marcante.",
        preco: "R$ 219,90",
        imagem: "imagens/produtos/perfumes/mafios.png",
        whatsapp: "Mafios"
    },
    {
        id: 3,
        nome: "Zariah",
        categoria: "Feminino",
        descricao: "Essência sedutora e mistérios perigosos. Zariah é uma fragrância que envolve, conquista e nunca é esquecida.",
        notas: { topo: "Rosa turca, Frutas vermelhas, Groselha", coracao: "Peônia, Íris, Patchouli", fundo: "Almíscar rosado, Baunilha, Sândalo" },
        sugestao: "Perfeita para encontros românticos, jantares e ocasiões noturnas onde você quer ser inesquecível.",
        preco: "R$ 199,90",
        imagem: "imagens/produtos/perfumes/zaraia.png",
        whatsapp: "Zariah"
    },
    {
        id: 4,
        nome: "Anurb'y",
        categoria: "Unissex",
        descricao: "Extremamente gostoso, suculento e efervescente. Anurb'y é alegria pura em forma de fragrância.",
        notas: { topo: "Maracujá, Manga, Pitaya", coracao: "Flor de laranjeira, Jasmim, Caramelo", fundo: "Coco, Baunilha cremosa, Almíscar" },
        sugestao: "Ótimo para o dia a dia, ambientes descontraídos e quem ama fragrâncias frutadas e marcantes.",
        preco: "R$ 179,90",
        imagem: "imagens/produtos/perfumes/anurby.png",
        whatsapp: "Anurby"
    },
    {
        id: 5,
        nome: "Blood & Silk Noir",
        categoria: "Feminino",
        descricao: "Uma presença. Um desejo que deixa marcas mesmo quando você some. Blood & Silk Noir é pura sedução em frasco.",
        notas: { topo: "Ameixa, Framboesa negra, Especiarias", coracao: "Rosa negra, Oud, Incenso", fundo: "Couro suave, Âmbar, Almíscar escuro" },
        sugestao: "Para noites intensas, ocasiões sofisticadas e mulheres que não passam despercebidas.",
        preco: "R$ 229,90",
        imagem: "imagens/produtos/perfumes/bloodesilk.png",
        whatsapp: "Blood Silk Noir"
    }
];

const params = new URLSearchParams(window.location.search);
const prodId = parseInt(params.get('id'));
const p = produtos.find(x => x.id === prodId);

if(!p){
    document.getElementById('detalheProduto').innerHTML = '<p style="padding:200px 40px;text-align:center;opacity:.5">Produto não encontrado.</p>';
} else {
    document.title = p.nome + ' — Kramer Parfum';
    const msg = encodeURIComponent('Olá! Tenho interesse no perfume ' + p.whatsapp);
    const waLink = 'https://wa.me/?text=' + msg;

    document.getElementById('detalheProduto').innerHTML = `
        <a href="perfumes.html" class="btn-voltar">← Voltar</a>
        <div class="detalhe-img" style="background-image:url('${p.imagem}')">
            <div class="detalhe-img-overlay"></div>
        </div>
        <div class="detalhe-info">
            <span class="detalhe-categoria">${p.categoria}</span>
            <h1 class="detalhe-nome">${p.nome}</h1>
            <p class="detalhe-desc">${p.descricao}</p>
            <div class="notas-wrap">
                <h3>Notas Olfativas</h3>
                <div class="notas-grid">
                    <div class="nota-item">
                        <span class="nota-label">Topo</span>
                        <p>${p.notas.topo}</p>
                    </div>
                    <div class="nota-item">
                        <span class="nota-label">Coração</span>
                        <p>${p.notas.coracao}</p>
                    </div>
                    <div class="nota-item">
                        <span class="nota-label">Fundo</span>
                        <p>${p.notas.fundo}</p>
                    </div>
                </div>
            </div>
            <div class="sugestao-wrap">
                <h3>Sugestão de Uso</h3>
                <p>${p.sugestao}</p>
            </div>
            <div class="detalhe-compra">
                <span class="detalhe-preco">${p.preco}</span>
                <a href="${waLink}" target="_blank" class="btn-comprar">Compre já no WhatsApp</a>
            </div>
        </div>
    `;
}
</script>
<script src="cube.js"></script>
</body>
</html>
